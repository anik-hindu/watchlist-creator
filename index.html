<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Watchlist Creator</title>

    <!-- Google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <!-- MY CSS -->
    <link rel="stylesheet" href="style.css" />

    <!-- Scripts -->
    <script type="module" src="./script.js"></script>
  </head>
  <body>
    <header class="header flex-align-center">
      <nav class="header__nav flex-align-center">
        <h1 class="header__title">Find your film</h1>
        <a href="./watchlist.html" class="header__link">My Watchlist</a>
      </nav>
    </header>
    <main>
      <section class="search flex-align-center">
        <form class="search__container flex-align-center">
          <img src="./assets/search-icon.png" class="search__icon" alt="" />
          <input
            id="search-input"
            type="text"
            class="search__input"
            placeholder="Search for a movie"
          />
          <button class="search__btn" id="search-btn">Search</button>
        </form>
      </section>

      <section class="decoration" id="decoration-el">
        <img src="./assets/movie-icon.png" alt="" class="decoration__image" />
        <p class="decoration__text">Start exploring</p>
      </section>

      <section class="movies hidden" id="movies-el"></section>

      <section class="error hidden" id="error-el">
        <p class="message">
          Unable to find what you’re looking for. Please try another search.
        </p>
      </section>
    </main>
  </body>
</html>
