<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WatchList Creator</title>

    <!-- Goggle Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />

    <!-- MY CSS -->
    <link rel="stylesheet" href="style.css" />

    <script type="module" src="./script.js"></script>
  </head>
  <body>
    <div class="container">
      <header>
        <nav>
          <h1>Find your film</h1>
          <a href="#">My Watchlist</a>
        </nav>
      </header>
      <main>
        <section class="movies" id="articles">
          <article class="movie">
            <img src="" alt="" class="poster-movie" />
            <div class="movie-content">
              <h2 class="title-movie">Movie Title</h2>
              <div class="info-movie">
                <p class="runtime">116 min</p>
                <p class="genre">Drama, Mystery, Sci-fi</p>
                <button id="add-watchlist-btn">Watchlist</button>
              </div>
              <p class="plot-movie">
                A blade runner must pursue and terminate four replicants who
                stole a ship in space, and have returned to Earth to find their
                creator.
              </p>
            </div>
          </article>
          <div class="line"></div>
        </section>
        <div class="decoration" id="decoration">
          <img src="./assets/movie-icon.png" alt="" />
          <p class="decoration-text">Start Exploring</p>
        </div>
      </main>
      <section class="search-bar">
        <form id="search-form">
          <div class="movie-input">
            <label for="movie-query"
              ><img src="./assets/search-icon.png" alt="" />
            </label>
            <input
              id="movie-query"
              type="text"
              placeholder="Search for a movie"
              name="movieQuery"
              class="search-input"
            />
          </div>
          <button type="submit" id="search-btn" class="search-btn">
            Search
          </button>
        </form>
      </section>
    </div>
  </body>
</html>
